services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dexter
      POSTGRES_PASSWORD: dexter
      POSTGRES_DB: dexter
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dexter -d dexter"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build: ./apps/gateway
    # DATABASE_URL must point at the `db` service hostname inside the docker
    # network; everything else flows in from .env (only vars actually set
    # are propagated, so Python-side defaults still apply for anything omitted).
    environment:
      DATABASE_URL: postgres://dexter:dexter@db:5432/dexter
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/gateway:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  dbdata:
